server:
    port: 9482
    servlet:
        context-path: /api/rally

mybatis-plus:
    mapper-locations: classpath*:mapper/**/*.xml
spring:
    application:
        name: rally
    servlet:
        multipart:
            max-file-size: 5MB
            max-request-size: 5MB
    profiles:
        active: dev

deepseek:
    api-key: ${DEEPSEEK_API_KEY:dev}
    api-url: https://api.deepseek.com/chat/completions

upload:
    tournament:
        compress-kb: 10

wechat:
    mini:
        app-id: ${WECHAT_APP_ID}
        secret: ${WECHAT_SECRET}
        code2session-url: https://api.weixin.qq.com/sns/jscode2session
