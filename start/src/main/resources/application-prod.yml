spring:
    datasource:
        url: jdbc:mysql://${MYSQL_ADDRESS}/fan?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
        username: ${MYSQL_USERNAME}
        password: ${MYSQL_PASSWORD}
        driver-class-name: com.mysql.cj.jdbc.Driver
        type: com.zaxxer.hikari.HikariDataSource

auth:
  jwt:
    secret: ${JWT_SECRET}
    expire-days: 7

qiniu:
  access-key: ${QINIU_ACCESS_KEY}
  secret-key: ${QINIU_SECRET_KEY}
  bucket: rallyo
  domain: https://static.fantasticmonkey.top

job:
  tour:
    enabled: true
    collect:
      draws:
        cron: "0 0 */1 * * ?"
      matches:
        cron: "0 0 */1 * * ?"
      live:
        cron: "0 */5 * * * ?"
      rank:
        cron: "0 0 4 * * ?"
  meetup:
    enabled: true
    status:
      cron: "0 0 2 * * ?"
    geo:
      cron: "0 0 */6 * * ?"

