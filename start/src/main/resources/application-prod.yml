spring:
    datasource:
        url: jdbc:mysql://${MYSQL_ADDRESS}/fan?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
        username: ${MYSQL_USERNAME}
        password: ${MYSQL_PASSWORD}
        driver-class-name: com.mysql.cj.jdbc.Driver
        type: com.zaxxer.hikari.HikariDataSource

auth:
  jwt:
    secret: ${JWT_SECRET}
    expire-days: 90

qiniu:
  access-key: ${QINIU_ACCESS_KEY}
  secret-key: ${QINIU_SECRET_KEY}
  bucket: rallyo
  domain: https://static.fantasticmonkey.top

job:
  tour:
    enabled: true
    collect:
      draws:
        cron: "0 0 */1 * * ?"
      matches:
        cron: "0 0 */1 * * ?"
      live:
        cron: "0 */5 * * * ?"
      rank:
        cron: "0 0 4 * * ?"
  meetup:
    enabled: true
    status:
      cron: "0 0 2 * * ?"
    court-statistics:
      cron: "0 0 3 * * ?"
  # 支付超时关单：默认 0=不超时（payment.pay_timeout_minutes=0），仅当配置正整数才需开启
  payment_timeout:
    enabled: false
    cron: "0 */5 * * * ?"
  # 分账对账：分账无可靠回调，必须开启
  settlement_reconcile:
    enabled: false
    cron: "0 */2 * * * ?"
  # 回调漏处理补偿：扫 payment_log 中 RECEIVED 超时未处理的重放
  payment_callback_recover:
    enabled: false
    cron: "0 */10 * * * ?"
  # 赛事每日凌晨批量匹配（资格赛+正赛逐轮）
  tournamentMatch:
    enabled: true
    cron: "0 0 2 * * ?"
  # 赛事比赛超时处理（每2小时扫描）
  tournamentMatchTimeout:
    enabled: true
    cron: "0 0 */2 * * ?"

