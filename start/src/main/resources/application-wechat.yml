spring:
    datasource:
        url: jdbc:mysql://${MYSQL_ADDRESS}/fan?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
        username: ${MYSQL_USERNAME}
        password: ${MYSQL_PASSWORD}
        driver-class-name: com.mysql.cj.jdbc.Driver
        type: com.zaxxer.hikari.HikariDataSource

job:
  tennis:
    enabled: true
    collect:
      draws:
        cron: "0 0 */1 * * ?"
      matches:
        cron: "0 0 */1 * * ?"
      live:
        cron: "0 */5 * * * ?"
