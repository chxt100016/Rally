spring:
    datasource:
        url: jdbc:mysql://${MYSQL_ADDRESS}/fan?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
        username: ${MYSQL_USERNAME}
        password: ${MYSQL_PASSWORD}
        driver-class-name: com.mysql.cj.jdbc.Driver
        type: com.zaxxer.hikari.HikariDataSource

job:
  tour:
    enabled: false
    collect:
      draws:
        cron: "0 0 */1 * * ?"
      matches:
        cron: "0 0 */1 * * ?"
      live:
        cron: "0 */5 * * * ?"
      rank:
        cron: "0 0 4 * * ?"

wechat:
  miniapp:
    appid: ${WECHAT_APPID}
    secret: ${WECHAT_SECRET}
    code2session-url: https://api.weixin.qq.com/sns/jscode2session

auth:
  jwt:
    secret: ${JWT_SECRET}
    expire-days: 7
