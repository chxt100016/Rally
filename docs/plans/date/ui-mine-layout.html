<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><title>我的页面 B 方案</title></head>
<body>
<h2>「我的」页面 · B 方案优化版</h2>
<p class="subtitle">可信度简化为一行摘要</p>

<div style="max-width:320px;margin:0 auto;">
  <div style="background:#f0f4ff;border-radius:12px;overflow:hidden;font-size:11px;font-family:monospace;">

    <!-- 顶部个人信息 -->
    <div style="background:#4f7cff;color:white;padding:14px 12px 16px;">
      <div style="display:flex;align-items:center;gap:10px;">
        <div style="width:48px;height:48px;background:rgba(255,255,255,0.25);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;">👤</div>
        <div>
          <div style="font-size:14px;font-weight:bold;">张三</div>
          <div style="font-size:10px;opacity:0.8;margin-top:2px;">NTRP 4.0 · 可信度 68/100</div>
        </div>
        <div style="margin-left:auto;font-size:10px;background:rgba(255,255,255,0.2);border-radius:4px;padding:3px 8px;">编辑资料</div>
      </div>
    </div>

    <!-- 快捷入口 -->
    <div style="background:white;margin:10px 8px 0;border-radius:10px;padding:10px 6px;">
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:4px;text-align:center;">
        <div style="padding:4px 0;">
          <div style="font-size:20px;margin-bottom:3px;">📋</div>
          <div style="font-size:9px;color:#555;">我发布的</div>
        </div>
        <div style="padding:4px 0;">
          <div style="font-size:20px;margin-bottom:3px;">🎾</div>
          <div style="font-size:9px;color:#555;">我参与的</div>
        </div>
        <div style="padding:4px 0;">
          <div style="font-size:20px;margin-bottom:3px;">⭐</div>
          <div style="font-size:9px;color:#555;">我的评价</div>
        </div>
        <div style="padding:4px 0;">
          <div style="font-size:20px;margin-bottom:3px;">🎬</div>
          <div style="font-size:9px;color:#555;">我的视频</div>
        </div>
      </div>
    </div>

    <!-- 可信度：一行简洁展示 -->
    <div style="background:white;margin:8px 8px 0;border-radius:10px;padding:9px 10px;display:flex;align-items:center;gap:8px;">
      <span style="font-size:10px;color:#aaa;">可信度</span>
      <div style="flex:1;background:#f0f0f0;border-radius:3px;height:5px;">
        <div style="background:#4f7cff;border-radius:3px;height:5px;width:68%;"></div>
      </div>
      <span style="font-size:11px;font-weight:bold;color:#4f7cff;">68</span>
      <span style="font-size:9px;color:#aaa;">/ 100</span>
      <span style="font-size:10px;color:#4f7cff;margin-left:2px;">详情 ›</span>
    </div>

    <!-- 评价摘要 -->
    <div style="background:white;margin:8px 8px 0;border-radius:10px;padding:10px;">
      <div style="font-size:10px;font-weight:bold;color:#333;margin-bottom:8px;">球员评价</div>
      <div style="display:flex;gap:6px;margin-bottom:8px;">
        <div style="text-align:center;flex:1;background:#f5f5f5;border-radius:8px;padding:6px 4px;">
          <div style="font-size:9px;color:#aaa;margin-bottom:2px;">自评</div>
          <div style="font-size:14px;font-weight:bold;color:#333;">4.0</div>
        </div>
        <div style="text-align:center;flex:1;background:#f5f5f5;border-radius:8px;padding:6px 4px;">
          <div style="font-size:9px;color:#aaa;margin-bottom:2px;">NTRP</div>
          <div style="font-size:14px;font-weight:bold;color:#333;">4.0</div>
        </div>
        <div style="text-align:center;flex:1;background:#f5f5f5;border-radius:8px;padding:6px 4px;">
          <div style="font-size:9px;color:#aaa;margin-bottom:2px;">他评次数</div>
          <div style="font-size:14px;font-weight:bold;color:#333;">5</div>
        </div>
      </div>
      <div style="display:flex;gap:4px;flex-wrap:wrap;">
        <div style="background:#e8eeff;color:#4f7cff;border-radius:10px;padding:2px 8px;font-size:9px;">正手稳 ×3</div>
        <div style="background:#e8eeff;color:#4f7cff;border-radius:10px;padding:2px 8px;font-size:9px;">发球好 ×2</div>
        <div style="background:#e8eeff;color:#4f7cff;border-radius:10px;padding:2px 8px;font-size:9px;">守时 ×4</div>
      </div>
    </div>

    <div style="height:10px;"></div>
  </div>
</div>
</body>
</html>
