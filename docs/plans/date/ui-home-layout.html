<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>首页发现约球 · Apple 风格</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
    background: #f2f2f7;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 40px 20px;
  }

  /* 手机外壳 */
  .phone {
    width: 375px;
    background: #f2f2f7;
    border-radius: 44px;
    box-shadow: 0 24px 80px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.08);
    overflow: hidden;
    position: relative;
  }

  /* 状态栏 */
  .status-bar {
    height: 44px;
    background: #f2f2f7;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    font-size: 12px;
    font-weight: 600;
    color: #000;
  }
  .status-bar .time { font-size: 15px; font-weight: 600; }
  .status-bar .icons { display: flex; gap: 6px; align-items: center; }

  /* 顶部导航 */
  .nav {
    padding: 4px 20px 12px;
    background: #f2f2f7;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .nav-title { font-size: 28px; font-weight: 700; color: #000; letter-spacing: -0.5px; }
  .nav-location {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 14px;
    color: #007aff;
    font-weight: 500;
  }

  /* Tab 栏 */
  .tabs {
    display: flex;
    gap: 8px;
    padding: 0 20px 16px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex-shrink: 0;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    background: #e5e5ea;
    color: #3c3c43;
    cursor: pointer;
  }
  .tab.active {
    background: #007aff;
    color: #fff;
  }

  /* 列表区 */
  .list {
    padding: 0 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  /* 约球卡片 */
  .card {
    background: #fff;
    border-radius: 16px;
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .card-title {
    font-size: 15px;
    font-weight: 600;
    color: #000;
    letter-spacing: -0.2px;
  }
  .badge {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 8px;
  }
  .badge-open   { background: #e8f5e9; color: #2e7d32; }
  .badge-almost { background: #fff3e0; color: #e65100; }
  .badge-full   { background: #f5f5f5; color: #8e8e93; }

  .card-meta {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 13px;
    color: #3c3c43;
  }
  .meta-item {
    display: flex;
    align-items: center;
    gap: 3px;
  }
  .meta-icon { font-size: 12px; }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: 4px;
    border-top: 0.5px solid #f2f2f7;
  }
  /* 不可报名的卡片整体降透明度 */
  .card-dim { opacity: 0.42; }

  .venue {
    font-size: 12px;
    color: #8e8e93;
    display: flex;
    align-items: center;
    gap: 3px;
  }

  /* 底部 Tab Bar */
  .tab-bar {
    margin-top: 20px;
    height: 83px;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(20px);
    border-top: 0.5px solid rgba(0,0,0,0.1);
    display: flex;
    align-items: flex-start;
    justify-content: space-around;
    padding-top: 10px;
  }
  .tab-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    font-size: 10px;
    color: #8e8e93;
    font-weight: 500;
  }
  .tab-item.active { color: #007aff; }
  .tab-icon { font-size: 22px; }

  /* 发布按钮（中间） */
  .fab {
    width: 44px;
    height: 44px;
    background: #007aff;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    color: #fff;
    font-weight: 300;
    box-shadow: 0 4px 12px rgba(0,122,255,0.4);
    margin-top: -8px;
  }
</style>
</head>
<body>

<div class="phone">

  <!-- 状态栏 -->
  <div class="status-bar">
    <span class="time">9:41</span>
    <div class="icons">
      <span>●●●</span>
      <span>WiFi</span>
      <span>🔋</span>
    </div>
  </div>

  <!-- 顶部导航 -->
  <div class="nav">
    <span class="nav-title">发现约球</span>
    <div class="nav-location">
      <span>📍</span>
      <span>北京 · 朝阳</span>
    </div>
  </div>

  <!-- Tab 筛选 -->
  <div class="tabs">
    <div class="tab">全部</div>
    <div class="tab active">推荐</div>
    <div class="tab">单打</div>
    <div class="tab">双打</div>
  </div>

  <!-- 约球列表 -->
  <div class="list">

    <!-- 卡片 1：匹配 -->
    <div class="card">
      <div class="card-header">
        <span class="card-title">周六下午单打</span>
        <span class="badge badge-open">1/2 人</span>
      </div>
      <div class="card-meta">
        <div class="meta-item">
          <span class="meta-icon">🕐</span>
          <span>06-07 &nbsp;14:00</span>
        </div>
        <div class="meta-item">
          <span class="meta-icon">⏱</span>
          <span>2h</span>
        </div>
        <div class="meta-item">
          <span class="meta-icon">👤</span>
          <span>NTRP 3.5–4.5</span>
        </div>
      </div>
      <div class="card-footer">
        <div class="venue">
          <span>📍</span>
          <span>朝阳网球中心</span>
        </div>
      </div>
    </div>

    <!-- 卡片 2：偏高，不可报名 -->
    <div class="card card-dim">
      <div class="card-header">
        <span class="card-title">双打找搭档</span>
        <span class="badge badge-almost">3/4 人</span>
      </div>
      <div class="card-meta">
        <div class="meta-item">
          <span class="meta-icon">🕐</span>
          <span>06-08 &nbsp;09:00</span>
        </div>
        <div class="meta-item">
          <span class="meta-icon">⏱</span>
          <span>1.5h</span>
        </div>
        <div class="meta-item">
          <span class="meta-icon">👤</span>
          <span>NTRP 4.0–5.0</span>
        </div>
      </div>
      <div class="card-footer">
        <div class="venue">
          <span>📍</span>
          <span>国贸体育馆</span>
        </div>
      </div>
    </div>

    <!-- 卡片 3：满员，不可报名 -->
    <div class="card card-dim">
      <div class="card-header">
        <span class="card-title">周日早上练球</span>
        <span class="badge badge-full">2/2 满</span>
      </div>
      <div class="card-meta">
        <div class="meta-item">
          <span class="meta-icon">🕐</span>
          <span>06-09 &nbsp;08:00</span>
        </div>
        <div class="meta-item">
          <span class="meta-icon">⏱</span>
          <span>1h</span>
        </div>
        <div class="meta-item">
          <span class="meta-icon">👤</span>
          <span>NTRP 3.0+</span>
        </div>
      </div>
      <div class="card-footer">
        <div class="venue">
          <span>📍</span>
          <span>望京体育场</span>
        </div>
      </div>
    </div>

    <!-- 卡片 4：偏低，不可报名 -->
    <div class="card card-dim">
      <div class="card-header">
        <span class="card-title">多人混打热身</span>
        <span class="badge badge-open">2/6 人</span>
      </div>
      <div class="card-meta">
        <div class="meta-item">
          <span class="meta-icon">🕐</span>
          <span>06-10 &nbsp;19:00</span>
        </div>
        <div class="meta-item">
          <span class="meta-icon">⏱</span>
          <span>2h</span>
        </div>
        <div class="meta-item">
          <span class="meta-icon">👤</span>
          <span>NTRP 2.0–3.0</span>
        </div>
      </div>
      <div class="card-footer">
        <div class="venue">
          <span>📍</span>
          <span>三里屯网球馆</span>
        </div>
      </div>
    </div>

  </div>

  <!-- 底部 Tab Bar -->
  <div class="tab-bar">
    <div class="tab-item active">
      <span class="tab-icon">🎾</span>
      <span>发现</span>
    </div>
    <div class="tab-item">
      <div class="fab">+</div>
    </div>
    <div class="tab-item">
      <span class="tab-icon">👤</span>
      <span>我的</span>
    </div>
  </div>

</div>

</body>
</html>
